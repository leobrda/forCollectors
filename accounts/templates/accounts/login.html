{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">ForCollectors</h2>
                        <p class="text-muted">Acesse sua galeria de colecionador</p>
                    </div>

                    <form method="POST" novalidate>
                        {% csrf_token %}
                        
                        {% if form.non_field_errors %}
                            <div class="alert alert-danger p-2 small">
                                {{ form.non_field_errors|striptags }}
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Usuário</label>
                            <input type="text" name="username" class="form-control no-focus-outline" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase">Senha</label>
                            <input type="password" name="password" class="form-control no-focus-outline" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Entrar</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted">Ainda não tem conta? 
                            <a href="{% url 'signup' %}" class="text-decoration-none fw-bold">Cadastre-se</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .no-focus-outline:focus {
        box-shadow: none !important;
        border-color: #0d6efd !important;
        transition: none !important;
    }
    body {
        background-color: #f8f9fa;
    }
</style>
{% endblock %}
