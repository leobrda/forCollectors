{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fadeIn">
    <div class="max-w-md w-full px-6">
        <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12 text-center">
                <!-- Ícone de E-mail Enviado -->
                <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full mb-6 shadow-sm">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>

                <h2 class="text-3xl font-black text-slate-900 tracking-tight">E-mail Enviado!</h2>
                <div class="mt-6 space-y-4">
                    <p class="text-slate-500 font-medium leading-relaxed">
                        Enviamos as instruções para redefinir sua senha no e-mail informado.
                    </p>
                    <p class="text-slate-400 text-sm italic">
                        Se não encontrar em alguns minutos, verifique sua pasta de <strong>Spam</strong>.
                    </p>
                </div>

                <div class="mt-10">
                    <a href="{% url 'login' %}" class="inline-flex items-center justify-center w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-black rounded-2xl transition shadow-lg active:scale-95">
                        Voltar ao Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
