{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fadeIn">
    <div class="max-w-md w-full px-6">
        <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12 text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full mb-6">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>

                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Senha Alterada!</h2>
                <p class="text-slate-500 mt-6 mb-10 font-medium">
                    A sua senha foi redefinida com sucesso. Já pode aceder à sua conta com as novas credenciais.
                </p>

                <a href="{% url 'login' %}" class="inline-flex items-center justify-center w-full py-4 bg-slate-900 hover:bg-emerald-600 text-white font-black rounded-2xl transition shadow-lg shadow-emerald-100 transform hover:-translate-y-1 active:scale-95">
                    Ir para o Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
