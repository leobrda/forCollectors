{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fadeIn">
    <div class="max-w-md w-full px-6">
        <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12 text-center">
                <!-- Ícone de Chave -->
                <div class="inline-flex items-center justify-center w-16 h-16 bg-sky-100 text-sky-600 rounded-2xl mb-6 shadow-sm">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                </div>

                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Recuperar Senha</h2>
                <p class="text-slate-500 mt-2 mb-8 font-medium">Insira seu e-mail e enviaremos um link para você definir uma nova senha.</p>

                <form method="POST" novalidate class="space-y-6 text-left">
                    {% csrf_token %}

                    <div class="space-y-2">
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest ml-1">
                            E-mail cadastrado
                        </label>
                        <input type="email" name="email" required
                               class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl px-4 py-3.5 text-slate-900 focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 outline-none transition-all duration-200"
                               placeholder="exemplo@gmail.com">
                    </div>

                    <div class="pt-2">
                        <button type="submit"
                                class="w-full py-4 bg-slate-900 hover:bg-sky-600 text-white font-black rounded-2xl shadow-xl shadow-slate-200 transition-all transform hover:-translate-y-1 active:scale-95">
                            Enviar Link de Redefinição
                        </button>
                    </div>
                </form>

                <div class="mt-8">
                    <a href="{% url 'login' %}" class="text-slate-400 hover:text-slate-600 text-sm font-bold transition">
                        Voltar para o Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
