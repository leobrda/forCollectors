{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fadeIn">
    <div class="max-w-md w-full px-6">
        <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">

            <div class="p-8 md:p-12">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-900 rounded-2xl mb-4 shadow-lg">
                        <span class="text-3xl">🛡️</span>
                    </div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">ForCollectors</h2>
                    <p class="text-slate-500 mt-2 font-medium">Acesse sua galeria de colecionador</p>
                </div>

                <form method="POST" novalidate class="space-y-6">
                    {% csrf_token %}

                    {% if form.non_field_errors %}
                        <div class="bg-rose-50 border border-rose-100 text-rose-600 px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2 animate-shake">
                            <span>⚠️</span>
                            {{ form.non_field_errors|striptags }}
                        </div>
                    {% endif %}

                    <div class="space-y-2">
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest ml-1">
                            Usuário
                        </label>
                        <input type="text" name="username" required
                               class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl px-4 py-3.5 text-slate-900 focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 outline-none transition-all duration-200"
                               placeholder="Seu nome de usuário">
                    </div>

                    <!-- Campo Senha com Lógica do Olhinho (Alpine.js) -->
                    <div class="space-y-2" x-data="{ show: false }">
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest ml-1">
                            Senha
                        </label>
                        <div class="relative">
                            <input :type="show ? 'text' : 'password'" name="password" required
                                   class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl px-4 py-3.5 text-slate-900 focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 outline-none transition-all duration-200"
                                   placeholder="••••••••">

                            <!-- Botão do Olhinho -->
                            <button type="button" @click="show = !show"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-600 transition-colors focus:outline-none">
                                <!-- Ícone de Olho Aberto -->
                                <svg x-show="!show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                                <!-- Ícone de Olho Fechado -->
                                <svg x-show="show" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-center mt-3">
                        <a href="{% url 'password_reset' %}"
                           class="text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors duration-200 decoration-none border-b border-transparent hover:border-slate-900">
                            Esqueci minha senha
                        </a>
                    </div>

                    <div class="pt-2">
                        <button type="submit"
                                class="w-full py-4 bg-slate-900 hover:bg-sky-600 text-white font-black rounded-2xl shadow-xl shadow-slate-200 transition-all transform hover:-translate-y-1 active:scale-95">
                            Entrar na Conta
                        </button>
                    </div>
                </form>

                <div class="text-center mt-10">
                    <p class="text-slate-500 text-sm">
                        Ainda não tem conta?
                        <a href="{% url 'signup' %}" class="text-sky-600 hover:text-sky-700 font-black transition-colors ml-1">
                            Cadastre-se agora
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
