<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForCollectors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">🛡️ ForCollectors</a>

            {% if user.is_authenticated %}
                <!-- Só aparece se estiver LOGADO -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navContent">
                    <div class="navbar-nav me-auto">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                        <a class="nav-link" href="{% url 'album_list' %}">Minhas Coleções</a>
                        <a class="nav-link text-info" href="{% url 'explore' %}">✨ Explorar</a>
                    </div>

                    <!-- Barra de Busca Global -->
                    <form class="d-flex me-lg-3 my-2 my-lg-0" action="{% url 'global_search' %}" method="GET">
                        <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Buscar itens..." aria-label="Search">
                        <button class="btn btn-outline-light btn-sm" type="submit">Buscar</button>
                    </form>

                    <div class="navbar-nav align-items-center">
                        <span class="nav-item nav-link text-light me-lg-3">Olá, <strong>{{ user.username }}</strong></span>
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                        </form>
                    </div>
                </div>
            {% else %}
                <!-- Só aparece para VISITANTES (Não logados) -->
                <div class="navbar-nav ms-auto">
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Entrar</a>
                    <a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Criar Conta</a>
                </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <main class="py-2">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
