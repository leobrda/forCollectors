{% extends 'base.html' %}

{% block content %}
<h2>Novo Item para: {{ collection.name }}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar Item</button>
</form>

<br>
<a href="{% url 'collection_detail' collection.pk %}">Cancelar</a>
{% endblock %}
