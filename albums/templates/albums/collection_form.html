{% extends 'base.html' %}

{% block content %}
    <h1>{% if form.instance.pk %}Editar{% else %}Nova{% endif %} Coleção</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar Coleção</button>
    </form>

    <br>
    <a href="{% url 'album_list' %}">Cancelar</a>
{% endblock %}
