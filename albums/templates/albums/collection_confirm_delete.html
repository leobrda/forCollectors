{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow border-0 py-5 px-4">
                <div class="card-body">
                    <div class="mb-4 text-danger">
                        <i class="bi bi-exclamation-octagon" style="font-size: 5rem;"></i>
                        <!-- Caso não tenha o ícone do Bootstrap, o emoji abaixo resolve -->
                        <div style="font-size: 4rem;">🚫</div>
                    </div>
                    <h2 class="fw-bold mb-3">Excluir Coleção?</h2>
                    <p class="text-muted fs-5 mb-4">
                        Você está prestes a apagar a coleção <br>
                        <strong class="text-dark">"{{ object.name }}"</strong>. <br>
                        <span class="text-danger fw-bold">Isso apagará permanentemente todos os itens e fotos salvos nela!</span>
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <button type="submit" class="btn btn-danger btn-lg px-5 fw-bold shadow-sm">Sim, Deletar Tudo</button>
                            <a href="{% url 'collection_detail' object.pk %}" class="btn btn-outline-secondary btn-lg px-5">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
