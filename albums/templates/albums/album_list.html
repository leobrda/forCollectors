{% if user.is_authenticated %}
    <p>Olá, {{ user.username }}! |
    <form action="{% url 'logout' %}" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Sair</button>
    </form>
    </p>
{% else %}
    <a href="{% url 'login' %}">Fazer Login</a>
{% endif %}

<hr>

<h1>Minhas Coleções</h1>
<p>Bem-vindo! Em breve suas coleções aparecerão aqui.</p>
<a href="{% url 'signup' %}">Criar outra conta</a>
